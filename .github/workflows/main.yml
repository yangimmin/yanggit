name: Pro Trader Market Bot

on:
  schedule:
    - cron: '0 9 * * 1-5'
    - cron: '0 11 * * 1-5'
    - cron: '0 13 * * 1-5'
    - cron: '30 15 * * 2-6'
    - cron: '0 21 * * 2-6'

  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4  # v3에서 v4로 최신화!

    - name: Set up Python
      uses: actions/setup-python@v5  # v4에서 v5로 최신화!
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yfinance requests pandas

    - name: Run Python script
      run: python bot.py
