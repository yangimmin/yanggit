name: Pro Trader Market Bot

on:
  schedule:
    # 한국 시간(KST) 기준 목표 시간보다 15분 일찍 실행되도록 UTC 시간 설정
    - cron: '45 8 * * 1-5'    # KST 17:45 실행 (18:00 수신 타겟)
    - cron: '45 10 * * 1-5'   # KST 19:45 실행 (20:00 수신 타겟)
    - cron: '45 12 * * 1-5'   # KST 21:45 실행 (22:00 수신 타겟)
    - cron: '15 15 * * 2-6'   # KST 00:15 실행 (00:30 수신 타겟)
    - cron: '45 20 * * 2-6'   # KST 05:45 실행 (06:00 수신 타겟)

  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yfinance requests pandas matplotlib

    - name: Run Python script
      run: python bot.py
